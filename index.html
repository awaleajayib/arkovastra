    :root{

      --rose:#b45769;

      --cream:#f8f3ef;
      --line:#e9dfd8;
      --sand:#eadfd7;

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:'DM Sans', sans-serif;
      color:var(--ink);
    }
    .serif{font-family:'Playfair Display', serif}
    .nav-link{
      position:relative;
      white-space:nowrap;
    }
    .nav-link:after{
      content:"";
      position:absolute;
      left:0;
      bottom:-10px;
      width:0;
      height:2px;
      background:var(--rose);
      transition:width .25s ease;
    }
    .nav-link:hover:after,.nav-link:focus-visible:after{width:100%}
    .hero-overlay{
      background:linear-gradient(90deg, rgba(22,18,17,.74) 0%, rgba(22,18,17,.38) 42%, rgba(22,18,17,.08) 100%);
    }
    .category-card img,.product-card img,.editorial-img{
      transition:transform .45s ease;
    }
    .category-card:hover img,.product-card:hover img,.editorial-wrap:hover .editorial-img{
      transform:scale(1.045);
    }
    .product-card{
      transition:transform .25s ease, box-shadow .25s ease;
    }
    .product-card:hover{
      transform:translateY(-5px);
      box-shadow:0 16px 34px rgba(36,28,24,.10);
    }
    .wishlist-btn.active{
      color:var(--rose);
      background:#fff1f3;
      border-color:#e7a7b3;
    }
    .wishlist-btn.active svg{
      fill:currentColor;
    }
    .fade-up{
      opacity:0;
      transform:translateY(18px);
      animation:fadeUp .75s ease forwards;
    }
    .delay-1{animation-delay:.12s}
    .delay-2{animation-delay:.24s}
    .delay-3{animation-delay:.36s}
    @keyframes fadeUp{
      to{opacity:1;transform:translateY(0)}
    }
    .focus-ring:focus-visible{
      outline:3px solid rgba(180,87,105,.35);
      outline-offset:3px;
    }
    @media (max-width:768px){
      .hero-overlay{
        background:linear-gradient(180deg, rgba(20,17,16,.25) 0%, rgba(20,17,16,.78) 100%);
      }
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();

      const scrollToTrending = () => {
        document.getElementById('trending').scrollIntoView({ behavior: 'smooth' });
      };

      document.getElementById('shop-now-btn').addEventListener('click', scrollToTrending);
      document.getElementById('sale-shop-btn').addEventListener('click', scrollToTrending);
      document.getElementById('explore-edit-btn').addEventListener('click', () => {
        document.getElementById('categories').scrollIntoView({ behavior: 'smooth' });
      });

      document.querySelectorAll('.wishlist-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
          btn.setAttribute('aria-pressed', String(btn.classList.contains('active')));
        });
      });

      const categoryMessage = document.getElementById('category-message');
      document.querySelectorAll('.category-card').forEach(card => {
        card.addEventListener('click', () => {
          categoryMessage.textContent = `Showing curated picks for ${card.dataset.category}.`;
          document.getElementById('trending').scrollIntoView({ behavior: 'smooth' });
        });
      });

      const searchInput = document.getElementById('product-search');
      const products = Array.from(document.querySelectorAll('.product-card'));
      const emptySearch = document.getElementById('empty-search');

      searchInput.addEventListener('input', (event) => {
        const term = event.target.value.trim().toLowerCase();
        let visibleCount = 0;

        products.forEach(card => {
          const visible = !term || card.dataset.productName.toLowerCase().includes(term);
          card.classList.toggle('hidden', !visible);
          if (visible) visibleCount++;
        });

        emptySearch.classList.toggle('hidden', visibleCount !== 0);
      });
    });
  </script>
